<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WustChat 智能问答管理</title>
    <style>
        :root { --bg:#f4f7fb; --card:#fff; --line:#d9e2ef; --primary:#2563eb; --primary-hover:#1d4ed8; --text:#1f2937; --muted:#6b7280; --chip:#e8f0ff; --shadow:0 12px 30px rgba(31,41,55,.08); --warn:#b45309; --warn-bg:#fff7ed; --success:#166534; --success-bg:#ecfdf5; }
        * { box-sizing:border-box; }
        body { margin:0; font-family:"Segoe UI",Arial,sans-serif; background:linear-gradient(180deg,#eef4ff 0%,var(--bg) 100%); color:var(--text); }
        .wrap { max-width:1180px; margin:0 auto; padding:24px 16px 40px; display: none; }
        .login-wrap { height: 100vh; display: flex; align-items: center; justify-content: center; background: #0f172a; }
        .login-card { background: white; padding: 2.5rem; border-radius: 20px; width: 360px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .login-card h2 { margin: 0 0 1.5rem; text-align: center; }
        .hero { display:flex; justify-content:space-between; gap:16px; align-items:center; margin-bottom:18px; }
        .hero h1 { margin:0; font-size:30px; }
        .hero p { margin:8px 0 0; color:var(--muted); }
        .pill { background:#dbeafe; color:#1d4ed8; border-radius:999px; padding:8px 14px; font-size:13px; font-weight:600; }
        .tabs { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
        .tab { width:auto; padding:10px 16px; border-radius:999px; border:1px solid #bfd0ea; background:#ffffff; color:#334155; cursor:pointer; font-weight:600; box-shadow:0 2px 8px rgba(37,99,235,.08); }
        .tab:hover { background:#eff6ff; color:#1d4ed8; border-color:#93c5fd; }
        .tab.active { background:var(--primary); color:white; border-color:var(--primary); }
        .panel { display:none; }
        .panel.active { display:block; }
        .card { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:18px; box-shadow:var(--shadow); margin-bottom:16px; }
        .grid { display:grid; grid-template-columns:repeat(12,1fr); gap:16px; }
        .span-6 { grid-column:span 6; }
        h2 { margin:0 0 10px; font-size:20px; }
        .desc { color:var(--muted); font-size:13px; margin-bottom:12px; }
        label { display:block; margin:10px 0 6px; font-weight:600; font-size:14px; }
        input, textarea, button { width:100%; padding:12px 14px; border:1px solid var(--line); border-radius:12px; font-size:14px; }
        textarea { min-height:220px; resize:vertical; line-height:1.6; }
        input:focus, textarea:focus { outline:none; border-color:#93c5fd; box-shadow:0 0 0 4px rgba(37,99,235,.08); }
        button { background:var(--primary); color:white; border:none; font-weight:600; cursor:pointer; }
        button:hover { background:var(--primary-hover); }
        button.secondary { background:#e5eefc; color:#1d4ed8; }
        button.secondary:hover { background:#d7e6ff; }
        button.danger { background:#dc2626; }
        button.danger:hover { background:#b91c1c; }
        .row { display:flex; gap:10px; flex-wrap:wrap; }
        .row > * { flex:1; }
        .chips { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
        .chip { background:var(--chip); color:#1d4ed8; padding:6px 10px; border-radius:999px; font-size:12px; }
        .config-list { display:grid; grid-template-columns:repeat(8,1fr); gap:12px; }
        .config-item { background:#fafcff; border:1px solid var(--line); border-radius:14px; padding:12px; }
        .config-item .label { color:var(--muted); font-size:12px; margin-bottom:6px; }
        .config-item .value { font-weight:600; word-break:break-all; }
        .output,.log { white-space:pre-wrap; word-break:break-word; background:#0f172a; color:#e2e8f0; border-radius:14px; padding:14px; min-height:180px; line-height:1.6; }
        .small { color:var(--muted); font-size:13px; margin-top:8px; }
        .notice { background:var(--warn-bg); color:var(--warn); border:1px solid #fed7aa; border-radius:14px; padding:12px 14px; margin-bottom:12px; font-size:13px; }
        .ok { background:var(--success-bg); color:var(--success); border:1px solid #bbf7d0; border-radius:14px; padding:12px 14px; margin-bottom:12px; font-size:13px; }
        table { width:100%; border-collapse:collapse; }
        th, td { text-align:left; padding:12px; border-bottom:1px solid var(--line); vertical-align:top; font-size:14px; }
        th { color:var(--muted); font-weight:600; }
        .table-actions { display:flex; gap:8px; flex-wrap:wrap; }
        .table-actions button { width:auto; padding:8px 12px; border-radius:10px; }
        @media (max-width:960px) { .span-6 { grid-column:span 12; } .config-list { grid-template-columns:repeat(2,1fr);} }
        @media (max-width:640px) { .hero { flex-direction:column; align-items:flex-start; } .config-list { grid-template-columns:1fr; } }
    </style>
</head>
<body>

<div id="loginSection" class="login-wrap">
    <div class="login-card">
        <h2>管理登录</h2>
        <div style="margin-bottom:1rem">
            <label>账号</label>
            <input id="loginUser" type="text" placeholder="学号/用户名">
        </div>
        <div style="margin-bottom:1.5rem">
            <label>密码</label>
            <input id="loginPass" type="password" placeholder="密码">
        </div>
        <button onclick="doLogin()">登录</button>
        <p id="loginMsg" style="color:var(--danger); font-size:12px; margin-top:10px; text-align:center;"></p>
    </div>
</div>

<div id="mainSection" class="wrap">
    <div class="hero">
        <div>
            <h1>WustChat 智能问答</h1>
            <p>基于 RAG 的校园智能问答系统，支持微服务接入、统一鉴权与缓存命中。</p>
        </div>
        <div style="display:flex; gap:8px; align-items:center;">
            <div id="userDisplay" class="pill" style="background:#f1f5f9; color:var(--text);">管理员</div>
            <button class="pill" style="cursor:pointer; border:none;" onclick="doLogout()">退出</button>
        </div>
    </div>
    <div class="tabs">
        <button class="tab active" onclick="switchTab('config', this)">系统概览</button>
        <button class="tab" onclick="switchTab('ingest', this)">语料录入</button>
        <button class="tab" onclick="switchTab('review', this)">投稿审核</button>
        <button class="tab" onclick="switchTab('corpus', this)">语料库</button>
        <button class="tab" onclick="switchTab('chat', this)">知识问答</button>
        <button class="tab" onclick="switchTab('log', this)">调试日志</button>
    </div>

    <div id="panel-config" class="panel active">
        <div class="card">
            <h2>运行状态</h2>
            <div class="config-list" id="configCards"></div>
            <div class="chips" id="tagChips"></div>
        </div>
        <div class="card">
            <h2>DeepSeek API 配置</h2>
            <div class="desc">设置后将持久化到本地文件。</div>
            <label>API Key</label>
            <input id="apiKey" type="password" placeholder="DeepSeek API Key">
            <div class="row" style="margin-top:10px;">
                <button onclick="saveApiKey()">保存配置</button>
                <button class="secondary" onclick="loadAll()">强制刷新</button>
                <button class="danger" onclick="clearQaCache()">清除问答缓存</button>
            </div>
            <div id="apiKeyMsg" class="small"></div>
        </div>
    </div>

    <div id="panel-ingest" class="panel">
        <div class="grid">
            <div class="card span-6">
                <h2>手动录入</h2>
                <label>分类标签</label>
                <input id="manualTag" type="text" placeholder="例如：课程 / 报修 / 咨询">
                <label>生效截止时间</label>
                <input id="manualExpireAt" type="text" placeholder="格式：2026-03-20 18:00 (可选)">
                <label>语料内容</label>
                <textarea id="manualText" placeholder="请输入知识点文本..."></textarea>
                <button onclick="ingestText()">立即入库</button>
            </div>
            <div class="card span-6">
                <h2>文件上传</h2>
                <div class="desc">支持 PDF, DOCX, XLSX, TXT, MD。</div>
                <label>分类标签</label>
                <input id="fileTag" type="text" placeholder="例如：制度 / 办事指南">
                <label>选择文件</label>
                <input id="fileInput" type="file">
                <button onclick="ingestFile()" style="margin-top:10px;">执行上传</button>
            </div>
        </div>
    </div>

    <div id="panel-review" class="panel">
        <div class="card">
            <h2>学生投稿审核</h2>
            <div style="overflow:auto;">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>标签</th>
                        <th>来源</th>
                        <th>内容预览</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="pendingTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="panel-corpus" class="panel">
        <div class="card">
            <h2>正式语料库</h2>
            <div style="overflow:auto;">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>标签</th>
                        <th>来源</th>
                        <th>内容预览</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="corpusTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="panel-chat" class="panel">
        <div class="card">
            <h2>RAG 检索对话</h2>
            <div class="desc">支持缓存命中的智能问答。</div>
            <label>输入问题</label>
            <input id="question" type="text" placeholder="有什么可以帮你的？">
            <button onclick="ask()" style="margin-top:10px;">发送提问</button>
            <div style="margin-top:20px;">
                <label>AI 回答</label>
                <div id="answer" class="output">等待提问...</div>
            </div>
        </div>
    </div>

    <div id="panel-log" class="panel">
        <div class="card">
            <h2>运行日志</h2>
            <div id="log" class="log"></div>
        </div>
    </div>
</div>

<script>
    const API_BASE = '/api/rag';
    const AUTH_BASE = '/auth';

    const encryptLoginPassword = async (plaintext) => {
        try {
            const webCrypto = window.crypto;
            if (!webCrypto || !webCrypto.subtle || typeof TextEncoder === 'undefined') return plaintext;
            const keyBytes = new TextEncoder().encode('0123456789abcdef0123456789abcdef');
            const iv = webCrypto.getRandomValues(new Uint8Array(12));
            const key = await webCrypto.subtle.importKey('raw', keyBytes, { name: 'AES-GCM' }, false, ['encrypt']);
            const cipherBuffer = await webCrypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, new TextEncoder().encode(plaintext));
            const cipherBytes = new Uint8Array(cipherBuffer);
            const combined = new Uint8Array(iv.length + cipherBytes.length);
            combined.set(iv, 0); combined.set(cipherBytes, iv.length);
            let binary = ''; combined.forEach(b => binary += String.fromCharCode(b));
            return 'ENC:' + btoa(binary);
        } catch (e) { return plaintext; }
    };

    async function request(url, options = {}) {
        const token = localStorage.getItem('admin_token');
        const headers = { ...options.headers };
        if (token) headers['Authorization'] = `Bearer ${token}`;
        if (!(options.body instanceof FormData)) headers['Content-Type'] = 'application/json';

        try {
            const res = await fetch(url, { ...options, headers });
            if (res.status === 401) {
                localStorage.removeItem('admin_token');
                checkAuth();
                throw new Error('会话过期，请重新登录');
            }
            const data = await res.json();
            if (data.code !== 200 && data.code !== 0) throw new Error(data.msg || data.message || '操作失败');
            return data.data !== undefined ? data.data : data;
        } catch (e) {
            log(e.message, true);
            throw e;
        }
    }

    function log(msg, isError = false) {
        const el = document.getElementById('log');
        el.textContent += `[${new Date().toLocaleTimeString()}] ${isError ? '❌' : 'ℹ️'} ${msg}\n`;
        el.scrollTop = el.scrollHeight;
    }

    function checkAuth() {
        const token = localStorage.getItem('admin_token');
        if (token) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('mainSection').style.display = 'block';
            loadAll();
        } else {
            document.getElementById('loginSection').style.display = 'flex';
            document.getElementById('mainSection').style.display = 'none';
        }
    }

    async function doLogin() {
        const u = document.getElementById('loginUser').value;
        const p = document.getElementById('loginPass').value;
        const msg = document.getElementById('loginMsg');
        try {
            const ep = await encryptLoginPassword(p);
            const res = await fetch(`${AUTH_BASE}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: ep })
            });
            const data = await res.json();
            if (data.code === 200 || data.code === 0) {
                const tk = data.data?.token || data.token || data.data;
                const role = data.data?.role ?? 0;
                localStorage.setItem('admin_token', tk);
                localStorage.setItem('admin_role', role);
                checkAuth();
            } else {
                msg.textContent = data.msg || data.message || '登录失败';
            }
        } catch (e) {
            msg.textContent = '网络错误';
        }
    }

    function doLogout() {
        localStorage.removeItem('admin_token');
        localStorage.removeItem('admin_role');
        checkAuth();
    }

    function switchTab(name, el) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('panel-' + name).classList.add('active');
        el.classList.add('active');
    }

    async function loadAll() {
        try {
            const config = await request(`${API_BASE}/config`);
            renderConfig(config);
            const corpus = await request(`${API_BASE}/corpus`);
            renderCorpus(corpus);
            const pending = await request(`${API_BASE}/pending-corpus`);
            renderPending(pending);
        } catch (e) {}
    }

    function renderConfig(data) {
        document.getElementById('configCards').innerHTML = `
            <div class="config-item"><div class="label">API 配置</div><div class="value">${data.apiKeyConfigured ? '✅ 已就绪' : '❌ 未设置'}</div></div>
            <div class="config-item"><div class="label">总语料数</div><div class="value">${data.corpusCount}</div></div>
            <div class="config-item"><div class="label">待审核</div><div class="value">${data.pendingCorpusCount}</div></div>
        `;
        const tags = data.tags || [];
        document.getElementById('tagChips').innerHTML = tags.map(t => `<span class="chip">${t}</span>`).join('');
    }

    function renderCorpus(data) {
        const tbody = document.getElementById('corpusTable');
        tbody.innerHTML = data.map(item => `
            <tr>
                <td>${item.id}</td>
                <td><span class="chip">${item.tag}</span></td>
                <td>${item.source}</td>
                <td><div style="max-width:400px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${item.textPreview}</div></td>
                <td><button class="danger" style="padding:4px 8px;" onclick="deleteCorpus(${item.id})">删除</button></td>
            </tr>
        `).join('') || '<tr><td colspan="5" style="text-align:center;">暂无语料</td></tr>';
    }

    function renderPending(data) {
        const tbody = document.getElementById('pendingTable');
        tbody.innerHTML = data.map(item => `
            <tr>
                <td>${item.id}</td>
                <td><span class="chip">${item.tag}</span></td>
                <td>${item.source}</td>
                <td><div style="max-width:400px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${item.textPreview}</div></td>
                <td class="table-actions">
                    <button onclick="approveReview(${item.id})">通过</button>
                    <button class="danger" onclick="rejectReview(${item.id})">拒绝</button>
                </td>
            </tr>
        `).join('') || '<tr><td colspan="5" style="text-align:center;">暂无投稿</td></tr>';
    }

    async function saveApiKey() {
        const apiKey = document.getElementById('apiKey').value;
        await request(`${API_BASE}/config/api-key`, { method: 'POST', body: JSON.stringify({ apiKey }) });
        alert('配置已更新');
        loadAll();
    }

    async function ingestText() {
        const tag = document.getElementById('manualTag').value;
        const text = document.getElementById('manualText').value;
        const expireAt = document.getElementById('manualExpireAt').value;
        await request(`${API_BASE}/ingest`, { method: 'POST', body: JSON.stringify({ tag, text, expireAt }) });
        alert('入库成功');
        loadAll();
    }

    async function ingestFile() {
        const file = document.getElementById('fileInput').files[0];
        const tag = document.getElementById('fileTag').value;
        if (!file) return alert('请选择文件');
        const fd = new FormData();
        fd.append('file', file);
        fd.append('tag', tag);
        await request(`${API_BASE}/ingest-file`, { method: 'POST', body: fd });
        alert('文件上传成功');
        loadAll();
    }

    async function approveReview(id) {
        await request(`${API_BASE}/pending-corpus/approve?id=${id}`, { method: 'POST' });
        loadAll();
    }

    async function rejectReview(id) {
        await request(`${API_BASE}/pending-corpus/reject?id=${id}`, { method: 'POST' });
        loadAll();
    }

    async function deleteCorpus(id) {
        if (!confirm('确定删除该语料吗？')) return;
        await request(`${API_BASE}/corpus/delete?id=${id}`, { method: 'POST' });
        loadAll();
    }

    async function clearQaCache() {
        if (!confirm('确定清除当前问答缓存吗？这通常用于调试最新回答效果。')) return;
        try {
            await request(`${API_BASE}/cache/qa/clear`, { method: 'POST' });
            alert('问答缓存已清除');
            log('已手动清除问答缓存');
        } catch (e) {}
    }

    async function ask() {
        const q = document.getElementById('question').value;
        const ans = document.getElementById('answer');
        ans.textContent = '检索中...';
        try {
            const res = await request(`${API_BASE}/chat?question=${encodeURIComponent(q)}`);
            ans.textContent = `${res.answer}`;
        } catch (e) {
            ans.textContent = '提问失败';
        }
    }

    checkAuth();
</script>
</body>
</html>
